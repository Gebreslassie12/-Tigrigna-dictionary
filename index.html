<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ትግርኛ መዝገበ ቃላት</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dictionary-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 550px;
            text-align: center;
        }

        .lang-switcher {
            text-align: right;
            margin-bottom: 15px;
        }

        .lang-switcher select {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            cursor: pointer;
            background-color: #fff;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .result-container {
            text-align: left;
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
        }

        .word-card {
            background-color: #f8f9fa;
            padding: 15px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .word-title {
            font-size: 19px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0 0 8px 0;
        }

        .no-result {
            color: #e74c3c;
            font-style: italic;
            text-align: center;
        }

        .support-section {
            margin-top: 30px;
            font-size: 14px;
            color: #34495e;
            text-align: center;
        }

        .support-title {
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .code-link {
            background-color: #27ae60;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .code-text {
            background-color: #f1f2f6;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: #2c3e50;
        }

        .copy-btn {
            padding: 6px 12px;
            font-size: 13px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="dictionary-container">
        <div class="lang-switcher">
            <select id="langSelect" onchange="changeLanguage()">
                <option value="ti">ትግርኛ</option>
                <option value="en">English</option>
            </select>
        </div>

        <h1 id="mainTitle">ትግርኛ መዝገበ ቃላት</h1>
        <p id="subTitle" class="subtitle">ዝደለይዎ ቃል ብትግርኛ ፅሒፎም ይድለዩ</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ቃል ኣብዚ የእትዉ..." oninput="searchWord()">
            <button id="searchBtn" onclick="searchWord()">ድለ</button>
        </div>

        <div id="resultContainer" class="result-container">
            </div>

        <div class="support-section">
            <hr>
            <p id="supportTitle" class="support-title">🌟 ነዚ መዝገበ ቃላት ንምግፋሕን ንምምዕባልን ሓገዝኩም ኣይፈለየና!</p>
            
            <p><strong id="supportLabel">Support/ሓግዝ:</strong> 
                <a href="tel:*806*0946911419*10%23" class="code-link" id="supportBtn">Support/ሓግዝ</a>
            </p>
            
            <p><strong id="teleLabel">ብቴሌብር (telebirr):</strong> 
                <span class="code-text" id="teleNum">0946911419</span>
                <button id="copyBtn" onclick="copyTelebirr()" class="copy-btn">ኮፒ ግበር</button>
                <span id="copyFeedback" style="color: #27ae60; display: block; margin-top: 5px; font-size: 11px;"></span>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
